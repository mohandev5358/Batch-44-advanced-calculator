<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Calculator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" class="form-control display" disabled>

    <div class="row g-2">
        <!-- Special -->
        <div class="col-4"><button class="btn btn-warning w-100" id="sqrt">√</button></div>
        <div class="col-4"><button class="btn btn-warning w-100" id="cbrt">∛</button></div>
        <div class="col-4"><button class="btn btn-warning w-100" id="power">xʸ</button></div>

        <!-- Controls -->
        <div class="col-3"><button class="btn btn-secondary w-100" id="clear">C</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100 op">/</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100 op">*</button></div>
        <div class="col-3"><button class="btn btn-danger w-100" id="back">⌫</button></div>

        <!-- Numbers -->
        <div class="col-3"><button class="btn btn-light w-100 num">7</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">8</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">9</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100 op">-</button></div>

        <div class="col-3"><button class="btn btn-light w-100 num">4</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">5</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">6</button></div>
        <div class="col-3"><button class="btn btn-secondary w-100 op">+</button></div>

        <div class="col-3"><button class="btn btn-light w-100 num">1</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">2</button></div>
        <div class="col-3"><button class="btn btn-light w-100 num">3</button></div>
        <div class="col-3"><button class="btn btn-success w-100" id="equal">=</button></div>

        <div class="col-6"><button class="btn btn-light w-100 num">0</button></div>
        <div class="col-6"><button class="btn btn-light w-100 num">.</button></div>
    </div>
</div>

<script src="assets/main.js"></script>

</body>
</html>
